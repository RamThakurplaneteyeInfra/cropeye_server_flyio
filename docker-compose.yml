services:
  db:
    image: postgis/postgis:15-3.3
    container_name: cropeye_postgres
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - cropeye_network

  web:
    build: .
    container_name: cropeye_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_NAME=test_db
      - DB_USER=postgres
      - DB_PASSWORD=admin
      - DB_PORT=5432
      - ALLOWED_HOSTS=*
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cropeye_network

volumes:
  postgres_data:
    driver: local

networks:
  cropeye_network:
    driver: bridge
